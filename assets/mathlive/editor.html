<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #101216;
      --panel: #171b22;
      --border: #394150;
      --text: #eef2f7;
      --hint: #9aa4b2;
      --mf-size: 1.1rem;
      --keycap-height: 46px;
      --keycap-font-size: 20px;
      --keycap-shift-font-size: 10px;
      --keycap-small-font-size: 12px;
      --keycap-extra-small-font-size: 11px;
      --keyboard-toolbar-font-size: 16px;
      --keyboard-padding-horizontal: 10px;
      --keyboard-padding-top: 8px;
      --keyboard-padding-bottom: 10px;
      --keycap-gap: 6px;
    }
    body {
      margin: 0;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      box-sizing: border-box;
    }
    .panel {
      min-height: calc(100vh - 24px);
      background: linear-gradient(180deg, rgba(132,210,255,0.08), transparent 42%), var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .label {
      font-size: 13px;
      color: var(--hint);
    }
    #keyboard-host {
      position: relative;
      min-height: 0;
    }
    .editor-shell {
      flex: 1;
      min-height: 0;
    }
    math-field {
      width: 100%;
      min-height: 180px;
      height: 100%;
      font-size: var(--mf-size);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 14px;
      box-sizing: border-box;
      color: var(--text);
    }
    math-field::part(virtual-keyboard-toggle) {
      display: none;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="label">MathLive 可视编辑</div>
    <div id="keyboard-host"></div>
    <div class="editor-shell">
      <math-field id="mf"></math-field>
    </div>
  </div>
  <script src="./mathlive.min.js"></script>
  <script>
    (() => {
      const bridge = (payload) => MathLiveBridge.postMessage(JSON.stringify(payload));
      try {
        MathfieldElement.fontsDirectory = './fonts';
        MathfieldElement.soundsDirectory = './sounds';
        const mf = document.getElementById('mf');
        const keyboardHost = document.getElementById('keyboard-host');
        mathVirtualKeyboard.container = keyboardHost;
        mathVirtualKeyboard.layouts = ['compact', 'symbols', 'alphabetic', 'greek'];
        mf.mathModeSpace = '\\:';
        mf.defaultMode = 'math';
        mf.mathVirtualKeyboardPolicy = 'manual';
        mf.smartFence = true;
        mf.inlineShortcuts = { 'oo': '\\infty' };
        mf.addEventListener('focusin', () => mathVirtualKeyboard.show());
        mf.addEventListener('focusout', () => mathVirtualKeyboard.hide());
        mf.addEventListener('input', () => {
          bridge({ type: 'input', latex: mf.value });
        });
        window.setFormula = (latex) => {
          mf.setValue(latex, { silenceNotifications: true });
        };
        window.configureMathLive = (rawConfig) => {
          const config = typeof rawConfig === 'string' ? JSON.parse(rawConfig) : rawConfig;
          const size = config.displayMode === 'block' ? '1.3rem' : '1.1rem';
          document.documentElement.style.setProperty('--mf-size', size);
        };
        bridge({ type: 'ready' });
      } catch (error) {
        bridge({ type: 'error', message: String(error) });
      }
    })();
  </script>
</body>
</html>
