name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  APP_NAME: LynAI

jobs:
  meta:
    name: Extract metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version: *//;s/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  build-android:
    name: Android
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --split-per-abi
      - name: Rename artifacts
        run: |
          mkdir -p release
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            arch=$(basename "$apk" | sed 's/^app-//;s/-release\.apk$//')
            cp "$apk" "release/${APP_NAME}_android_${V}_${S}_${arch}.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_android
          path: release/

  build-windows:
    name: Windows (x86_64)
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows
      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $name = "$env:APP_NAME" + "_windows_" + "${{ needs.meta.outputs.version }}" + "_" + "${{ needs.meta.outputs.short_sha }}" + "_x86_64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "release/$name"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_windows_x86_64
          path: release/

  build-macos:
    name: macOS (arm64)
    needs: meta
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos
      - name: Package artifact
        run: |
          mkdir -p release
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/release/${APP_NAME}_macos_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}_arm64.zip" *.app
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_macos_arm64
          path: release/

  build-web:
    name: Web
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web
      - name: Package artifact
        run: |
          mkdir -p release
          cd build/web
          zip -r "$GITHUB_WORKSPACE/release/${APP_NAME}_web_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_web
          path: release/

  pre-release:
    name: Pre-release
    needs: [meta, build-android, build-windows, build-macos, build-web]
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Delete old nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ needs.meta.outputs.version }} @ ${{ needs.meta.outputs.short_sha }})"
          prerelease: true
          files: release/*
          fail_on_unmatched_files: true

  stable-release:
    name: Stable Release
    needs: [meta, build-android, build-windows, build-macos, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
