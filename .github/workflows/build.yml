name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  APP_NAME: LynAI

jobs:
  meta:
    name: Extract metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version: *//;s/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: ./gradlew app:testDebugUnitTest
        working-directory: android

  production-https-gate:
    name: Production HTTPS gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject insecure stable backend defaults
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python3 - <<'PY'
          import pathlib

          source = pathlib.Path('lib/services/backend_client.dart').read_text()
          if "String.fromEnvironment('LYNAI_BACKEND_URL'" not in source:
              raise SystemExit('Stable releases must source the backend URL from LYNAI_BACKEND_URL')
          if "defaultValue: ''" not in source:
              raise SystemExit('Stable releases must remain unconfigured without LYNAI_BACKEND_URL')
          if 'http://' in source:
              raise SystemExit('Stable releases must not contain a hard-coded HTTP backend URL')
          PY

  build-android:
    name: Android
    needs: [meta, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Cache ncnn/opencv/ocr deps
        uses: actions/cache@v4
        with:
          path: |
            android/app/src/main/jni/ncnn-android
            android/app/src/main/jni/opencv-mobile
            android/app/src/main/assets/ocr_models
          key: ncnn-deps-20260526-opencv-4.13.0-v35
      - name: Fetch ncnn/opencv/PPOCRv5 native deps
        run: bash scripts/fetch-ncnn-deps.sh
      - name: Install Rust Android targets
        run: rustup target add armv7-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android
      - run: flutter build apk --split-per-abi
      - name: Rename artifacts
        run: |
          mkdir -p release
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            arch=$(basename "$apk" | sed 's/^app-//;s/-release\.apk$//')
            cp "$apk" "release/${APP_NAME}_android_${V}_${S}_${arch}.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_android_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}
          path: release/

  build-linux:
    name: Linux
    needs: [meta, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang ninja-build pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libsecret-1-dev liblzma-dev zstd
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build linux
      - name: Create .deb package
        run: |
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          PKG="deb-pkg"
          B="build/linux/x64/release/bundle"

          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/lib/lynai" "${PKG}/usr/bin" "${PKG}/usr/share/applications"
          cp -r "${B}"/* "${PKG}/usr/lib/lynai/"

          cat > "${PKG}/usr/bin/lynai" << 'SCRIPT'
          #!/bin/bash
          exec /usr/lib/lynai/lynai "$@"
          SCRIPT
          chmod +x "${PKG}/usr/bin/lynai"

          cat > "${PKG}/usr/share/applications/lynai.desktop" << DESKTOP
          [Desktop Entry]
          Name=LynAI
          Exec=/usr/bin/lynai
          Type=Application
          Categories=Utility;
          DESKTOP

          SIZE_KB=$(du -sk "${PKG}" | cut -f1)
          cat > "${PKG}/DEBIAN/control" << CONTROL
          Package: lynai
          Version: ${V}
          Architecture: amd64
          Maintainer: lynai
          Installed-Size: ${SIZE_KB}
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libsecret-1-0, liblzma5
          Description: LynAI - Flutter desktop application
          CONTROL

          mkdir -p release
          dpkg-deb --build "${PKG}" "release/${APP_NAME}_debian_${V}_${S}_amd64.deb"

      - name: Create Arch Linux package
        run: |
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          PKG="arch-pkg"
          B="build/linux/x64/release/bundle"

          mkdir -p "${PKG}/usr/lib/lynai" "${PKG}/usr/bin" "${PKG}/usr/share/applications"
          cp -r "${B}"/* "${PKG}/usr/lib/lynai/"

          cat > "${PKG}/usr/bin/lynai" << 'SCRIPT'
          #!/bin/bash
          exec /usr/lib/lynai/lynai "$@"
          SCRIPT
          chmod +x "${PKG}/usr/bin/lynai"

          cat > "${PKG}/usr/share/applications/lynai.desktop" << DESKTOP
          [Desktop Entry]
          Name=LynAI
          Exec=/usr/bin/lynai
          Type=Application
          Categories=Utility;
          DESKTOP

          cat > "${PKG}/.PKGINFO" << PKGINFO
          pkgname = lynai
          pkgver = ${V}-1
          pkgdesc = LynAI - Flutter desktop application
          url = https://github.com/lynyugiri/lynai
          arch = x86_64
          license = GPL-3.0-or-later
          depend = gtk3
          depend = webkit2gtk-4.1
          depend = libsecret
          depend = xz
          PKGINFO

          mkdir -p release
          tar cf - -C "${PKG}" . | zstd -19 -o "release/${APP_NAME}_archlinux_${V}_${S}_amd64.pkg.tar.zst"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_linux_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}_x64
          path: release/

  build-windows:
    name: Windows (x64)
    needs: [meta, quality]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows
      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $name = "$env:APP_NAME" + "_windows_" + "${{ needs.meta.outputs.version }}" + "_" + "${{ needs.meta.outputs.short_sha }}" + "_x64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "release/$name"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_windows_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}_x64
          path: release/

  build-macos:
    name: macOS (${{ matrix.arch }})
    needs: [meta, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Patch speech_to_text Swift package
        run: ruby scripts/patch-speech-to-text.rb
      - name: Build macOS app
        run: flutter build macos --release
      - name: Package artifact
        run: |
          mkdir -p release
          app_path="build/macos/Build/Products/Release/lynai.app"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "release/${APP_NAME}_macos_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}_${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_macos_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}_${{ matrix.arch }}
          path: release/

  pre-release:
    name: Pre-release
    needs: [meta, build-android, build-linux, build-windows, build-macos]
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Delete all old pre-releases
        run: |
          gh release list --json tagName,isPrerelease --jq '.[] | select(.isPrerelease) | .tagName' | while read -r tag; do
            echo "Deleting pre-release: $tag"
            gh release delete "$tag" --yes 2>/dev/null || true
            git push --delete origin "$tag" 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ needs.meta.outputs.version }} @ ${{ needs.meta.outputs.short_sha }})"
          prerelease: true
          files: release/*
          fail_on_unmatched_files: true

  stable-release:
    name: Stable Release
    needs: [meta, production-https-gate, build-android, build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Get tag message
        id: tag_message
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_TYPE=$(git cat-file -t "$TAG_NAME" 2>/dev/null || echo "commit")
          TAG_TARGET=$(git rev-list -n 1 "$TAG_NAME")

          if [ "$TAG_TYPE" = "tag" ]; then
            TAG_SUBJECT=$(git tag -l --format='%(subject)' "$TAG_NAME")
            TAG_BODY=$(git tag -l --format='%(body)' "$TAG_NAME")
          else
            TAG_SUBJECT=$(git show -s --format=%s "$TAG_TARGET")
            TAG_BODY=$(git show -s --format=%b "$TAG_TARGET")
          fi

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "## Git Tag" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "- Tag: \`$TAG_NAME\`" >> $GITHUB_OUTPUT
          echo "- Target: \`$TAG_TARGET\`" >> $GITHUB_OUTPUT
          echo "- Type: \`$TAG_TYPE\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Tag Message" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          if [ -n "$TAG_SUBJECT" ]; then
            echo "$TAG_SUBJECT" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG_NAME" >> $GITHUB_OUTPUT
          fi
          if [ -n "$TAG_BODY" ]; then
            echo "" >> $GITHUB_OUTPUT
            echo "$TAG_BODY" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.tag_message.outputs.message }}
          files: release/*
          fail_on_unmatched_files: true
