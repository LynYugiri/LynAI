name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  APP_NAME: LynAI
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  meta:
    name: Extract metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/^version: *//;s/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  build-android:
    name: Android
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --split-per-abi
      - name: Rename artifacts
        run: |
          mkdir -p release
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            arch=$(basename "$apk" | sed 's/^app-//;s/-release\.apk$//')
            cp "$apk" "release/${APP_NAME}_android_${V}_${S}_${arch}.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_android
          path: release/

  build-linux:
    name: Linux
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang ninja-build pkg-config libgtk-3-dev liblzma-dev zstd
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build linux
      - name: Create .deb package
        run: |
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          PKG="deb-pkg"
          B="build/linux/x64/release/bundle"

          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/lib/lynai" "${PKG}/usr/bin" "${PKG}/usr/share/applications"
          cp -r "${B}"/* "${PKG}/usr/lib/lynai/"

          cat > "${PKG}/usr/bin/lynai" << 'SCRIPT'
          #!/bin/bash
          exec /usr/lib/lynai/lynai "$@"
          SCRIPT
          chmod +x "${PKG}/usr/bin/lynai"

          cat > "${PKG}/usr/share/applications/lynai.desktop" << DESKTOP
          [Desktop Entry]
          Name=LynAI
          Exec=/usr/bin/lynai
          Type=Application
          Categories=Utility;
          DESKTOP

          SIZE_KB=$(du -sk "${PKG}" | cut -f1)
          cat > "${PKG}/DEBIAN/control" << CONTROL
          Package: lynai
          Version: ${V}
          Architecture: amd64
          Maintainer: lynai
          Installed-Size: ${SIZE_KB}
          Depends: libgtk-3-0, liblzma5
          Description: LynAI - Flutter desktop application
          CONTROL

          mkdir -p release
          dpkg-deb --build "${PKG}" "release/${APP_NAME}_linux_${V}_${S}_amd64.deb"

      - name: Create Arch Linux package
        run: |
          V="${{ needs.meta.outputs.version }}"
          S="${{ needs.meta.outputs.short_sha }}"
          PKG="arch-pkg"
          B="build/linux/x64/release/bundle"

          mkdir -p "${PKG}/usr/lib/lynai" "${PKG}/usr/bin" "${PKG}/usr/share/applications"
          cp -r "${B}"/* "${PKG}/usr/lib/lynai/"

          cat > "${PKG}/usr/bin/lynai" << 'SCRIPT'
          #!/bin/bash
          exec /usr/lib/lynai/lynai "$@"
          SCRIPT
          chmod +x "${PKG}/usr/bin/lynai"

          cat > "${PKG}/usr/share/applications/lynai.desktop" << DESKTOP
          [Desktop Entry]
          Name=LynAI
          Exec=/usr/bin/lynai
          Type=Application
          Categories=Utility;
          DESKTOP

          cat > "${PKG}/.PKGINFO" << PKGINFO
          pkgname = lynai
          pkgver = ${V}-1
          pkgdesc = LynAI - Flutter desktop application
          url = https://github.com/lynyugiri/lynai
          arch = x86_64
          license = MIT
          depend = gtk3
          depend = xz
          PKGINFO

          mkdir -p release
          tar cf - -C "${PKG}" . | zstd -19 -o "release/${APP_NAME}_linux_${V}_${S}_x86_64.pkg.tar.zst"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_linux
          path: release/

  build-windows:
    name: Windows (x86_64)
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows
      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $name = "$env:APP_NAME" + "_windows_" + "${{ needs.meta.outputs.version }}" + "_" + "${{ needs.meta.outputs.short_sha }}" + "_x86_64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "release/$name"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_windows_x86_64
          path: release/

  build-web:
    name: Web
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web
      - name: Package artifact
        run: |
          mkdir -p release
          cd build/web
          zip -r "$GITHUB_WORKSPACE/release/${APP_NAME}_web_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.short_sha }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_web
          path: release/

  pre-release:
    name: Pre-release
    needs: [meta, build-android, build-linux, build-windows, build-web]
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Delete old nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ needs.meta.outputs.version }} @ ${{ needs.meta.outputs.short_sha }})"
          prerelease: true
          files: release/*
          fail_on_unmatched_files: true

  stable-release:
    name: Stable Release
    needs: [meta, build-android, build-linux, build-windows, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
