org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false

# Build performance: parallel builds across plugin subprojects and reusable
# task outputs. nonTransitiveRClass / nonFinalResIds shrink the generated R
# class and speed up Java/Kotlin compilation. configuration-cache is omitted
# because AGP 8.11's builtInKotlin services cannot be serialized while the
# plugins above still ship their own Kotlin Gradle Plugin.
org.gradle.parallel=true
org.gradle.caching=true
android.nonTransitiveRClass=true
android.nonFinalResIds=true
kotlin.incremental=true
kotlin.daemon.enabled=true
